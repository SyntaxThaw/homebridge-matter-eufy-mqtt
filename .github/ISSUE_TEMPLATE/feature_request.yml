name: Feature Request
description: Suggest a new feature or improvement
title: "feat: "
labels:
  - enhancement
  - needs triage
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for improving the plugin? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? What is the current limitation?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you have considered?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Area of impact
      options:
        - Matter integration
        - MQTT / Eufy protocol
        - Room selection
        - Cleaning modes / suction
        - Device discovery
        - Configuration
        - Documentation
        - Other
    validations:
      required: true
