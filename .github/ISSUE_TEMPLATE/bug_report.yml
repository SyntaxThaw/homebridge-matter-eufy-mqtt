name: Bug Report
description: Report a bug or unexpected behaviour in the plugin
title: "bug: "
labels:
  - bug
  - needs triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible — it helps us reproduce and fix issues faster.

  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      placeholder: "e.g. 4.0.0"
    validations:
      required: true

  - type: input
    id: homebridge_version
    attributes:
      label: Homebridge version
      placeholder: "e.g. 2.0.1"
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0 (run: node --version)"
    validations:
      required: true

  - type: input
    id: device_model
    attributes:
      label: Device model
      placeholder: "e.g. Eufy RoboVac X10 Pro Omni (T2351)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure the plugin with ...
        2. Restart Homebridge
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Start Homebridge with `-D` for debug logs. **Redact your email and password.**
      render: text
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Plugin configuration (redact credentials)
      render: json
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing issues before opening this one
          required: true
        - label: I have redacted my email and password from all logs and config
          required: true
