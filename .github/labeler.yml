# Auto-label rules for pull requests based on changed files.
# See: https://github.com/actions/labeler

bug:
  - head-branch: ["^fix/", "^bugfix/", "^hotfix/"]

enhancement:
  - head-branch: ["^feat/", "^feature/"]

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"
          - "wiki/**"

dependency:
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "package-lock.json"

github-actions:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/dependabot.yml"

breaking change:
  - head-branch: ["^breaking/"]

# AI pipeline risk labels
"ai:risky":
  - changed-files:
      - any-glob-to-any-file:
          - "src/eufy/auth.ts"
          - "src/eufy/http.ts"
          - "src/eufy/client.ts"
          - "src/eufy/mqtt.ts"
          - "src/eufy/parser.ts"
          - "src/eufy/codec.ts"
          - "src/eufy/models.ts"
          - "src/matter/**"
          - "src/device-session.ts"

"ai:safe-change":
  - changed-files:
      - all-globs-to-all-files:
          - "!src/**"
          - "!config.schema.json"
