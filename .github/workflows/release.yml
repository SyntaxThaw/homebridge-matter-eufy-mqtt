name: Release

on:
  push:
    branches:
      - main
      - beta

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      # No `registry-url` here on purpose: setup-node would generate an
      # .npmrc with `_authToken=${NODE_AUTH_TOKEN}` which forces token-based
      # auth and causes `npm whoami` to 401 under OIDC trusted publishing.
      # The registry comes from `publishConfig.registry` in package.json,
      # and @semantic-release/npm@13.x auto-detects OIDC via npm 11.5.1+.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Verify npm >= 11.5.1 (required for OIDC trusted publishing)
        run: |
          REQ=11.5.1
          HAVE="$(npm -v)"
          if [ "$(printf '%s\n%s\n' "$REQ" "$HAVE" | sort -V | head -n1)" != "$REQ" ]; then
            echo "::error::npm $HAVE is too old for OIDC trusted publishing (need >= $REQ). Bump node-version."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: npx semantic-release
