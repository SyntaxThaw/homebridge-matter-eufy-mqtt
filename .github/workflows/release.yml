name: Release

on:
  # Fires after CI completes on main/beta — works even when CI was triggered
  # by a GITHUB_TOKEN-authored merge commit (which would block a plain `push`
  # trigger due to GitHub's anti-loop protection).
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, beta]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    # Skip if CI failed; always run on manual dispatch.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          # For workflow_run events the default ref points to the default branch
          # head, not the commit that triggered CI — use the triggering SHA.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: npx semantic-release
