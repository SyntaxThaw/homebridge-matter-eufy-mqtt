name: Release

on:
  # Fires after CI completes on main/beta — works even when CI was triggered
  # by a GITHUB_TOKEN-authored merge commit (which would block a plain `push`
  # trigger due to GitHub's anti-loop protection).
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, beta]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # required for OIDC trusted publishing and npm provenance

concurrency:
  group: release-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    # Skip if CI failed; always run on manual dispatch.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      # Generate a GitHub App token so the version-bump commit pushed by
      # @semantic-release/git can bypass the "require PR" branch protection
      # rule. GITHUB_TOKEN is rejected by that rule; an App that is registered
      # as a bypass actor is not. Falls back gracefully when RELEASE_APP_ID is
      # not configured (dry-run / forks without secrets).
      - name: Generate GitHub App token
        id: app-token
        if: ${{ vars.RELEASE_APP_ID != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token || secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          # For workflow_run the default ref points to the repository default
          # branch, not the commit that triggered CI — use the triggering SHA.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # workflow_run checkouts land in detached-HEAD mode. semantic-release
      # reads the branch name via `git symbolic-ref HEAD` to decide which
      # release channel to use (main vs beta prerelease). Reset the local
      # branch pointer to the exact tested SHA so no new commits can slip in.
      - name: Attach HEAD to triggering branch
        if: github.event_name == 'workflow_run'
        run: git checkout -B "${{ github.event.workflow_run.head_branch }}"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: npx semantic-release
