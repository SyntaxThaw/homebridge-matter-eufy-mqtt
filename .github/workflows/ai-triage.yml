name: AI Triage (Claude)

on:
  issues:
    types: [opened]
  pull_request_target: # pull_request_target keeps write-token on fork PRs
    types: [opened]

concurrency:
  group: ai-triage-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest
    continue-on-error: true # never blocks the pipeline when Claude is unavailable
    if: |
      github.actor != 'github-actions[bot]' &&
      github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      # Secrets cannot be used directly in `if:` expressions (GitHub masks them).
      # Expose as an env var so the conditional step can read it.
      HAS_KEY: ${{ secrets.CLAUDE_CODE_API_KEY != '' }}
    steps:
      # Check out the BASE branch only — never the fork's untrusted code.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}

      - name: Run Claude triage
        id: claude
        if: env.HAS_KEY == 'true'
        # Pinned to immutable SHA to prevent silent supply-chain changes to a
        # workflow that holds both GITHUB_TOKEN write access and the Claude API key.
        uses: anthropics/claude-code-action@28f83620103c48a57093dcc2837eec89e036bb9f # beta
        with:
          claude-api-key: ${{ secrets.CLAUDE_CODE_API_KEY }}
          prompt-file: .github/claude/prompts/triage.md

      - name: Fallback — apply needs-triage label when Claude is unavailable
        if: env.HAS_KEY != 'true' || failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          gh issue edit "$NUMBER" --add-label "needs triage" 2>/dev/null || \
          gh pr edit   "$NUMBER" --add-label "needs triage" 2>/dev/null || true
