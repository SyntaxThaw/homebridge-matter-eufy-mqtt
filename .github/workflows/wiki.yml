name: Publish Wiki

on:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Push wiki/ to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Push to GitHub Wiki
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          WIKI_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"

          git clone "$WIKI_URL" wiki-repo
          cp wiki/*.md wiki-repo/
          cd wiki-repo

          git add .
          if git diff --cached --quiet; then
            echo "No wiki changes to publish."
          else
            git commit -m "docs: sync wiki from main [skip ci]"
            git push
          fi
