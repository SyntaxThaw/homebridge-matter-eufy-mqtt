name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Semver increment type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump:
    name: Bump package version, tag, and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION="$(npm version "${{ inputs.bump_type }}" --no-git-tag-version)"
          echo "version=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Commit version files
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"

      - name: Create tag
        run: git tag "v${{ steps.bump.outputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
